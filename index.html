<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega Fácil Super - Sistema Completo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #f0f2f5; 
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            margin-bottom: 20px;
        }
        h1, h2, h3 { margin-bottom: 15px; color: #1a73e8; }
        h1 { text-align: center; }
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            margin: 5px 0 15px 0; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-size: 14px;
        }
        button { 
            padding: 10px 20px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 14px;
            margin: 5px 5px 5px 0;
        }
        button:hover { background: #1557b0; }
        button.danger { background: #d93025; }
        button.success { background: #188038; }
        button.warning { background: #f9ab00; }
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .status { 
            padding: 10px; 
            border-radius: 4px; 
            margin-bottom: 15px; 
            text-align: center; 
            font-weight: bold;
        }
        .conectado { background: #e6f4ea; color: #188038; }
        .erro { background: #fce8e6; color: #d93025; }
        .pedido { 
            border: 1px solid #ddd; 
            padding: 15px; 
            border-radius: 6px; 
            margin: 10px 0;
        }
        .pedido.novo { border-left: 5px solid #f9ab00; animation: piscar 1s infinite; }
        .pedido.andamento { border-left: 5px solid #1a73e8; }
        .pedido.finalizado { border-left: 5px solid #188038; opacity: 0.7; }
        @keyframes piscar { 50% { background: #fff3cd; } }
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab { padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.ativo { border-bottom: 3px solid #1a73e8; font-weight: bold; }
        .chat-box { 
            height: 300px; 
            border: 1px solid #ddd; 
            overflow-y: auto; 
            padding: 10px; 
            margin-bottom: 10px;
            background: #f9f9f9;
        }
        .msg { margin: 5px 0; padding: 8px; border-radius: 6px; max-width: 70%; }
        .msg.minha { background: #d2e3fc; margin-left: auto; }
        .msg.outra { background: #e8eaed; }
        .notificacao { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            background: #d93025; 
            color: white; 
            padding: 15px 20px; 
            border-radius: 8px; 
            z-index: 9999;
            animation: tremer 0.5s infinite;
        }
        @keyframes tremer { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f1f3f4; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 12px; color: white; }
        .badge.admin { background: #d93025; }
        .badge.entregador { background: #1a73e8; }
        .badge.restaurante { background: #188038; }
    </style>
</head>
<body>
    <!-- ÁUDIO DE NOTIFICAÇÃO -->
    <audio id="notificacaoAudio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <!-- TELA DE LOGIN -->
        <div id="telaLogin" class="card" style="max-width: 400px; margin: 50px auto;">
            <h1>🚀 Entrega Fácil Super</h1>
            <div id="statusConexao" class="status">🔄 Conectando...</div>
            <input type="text" id="loginUsuario" placeholder="Usuário">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button onclick="fazerLogin()" style="width: 100%;">ENTRAR</button>
            <div id="criarAdminInicial" class="hidden" style="margin-top: 15px; text-align: center;">
                <button class="success" onclick="criarAdminInicial()">+ CRIAR ADMIN INICIAL</button>
            </div>
        </div>

        <!-- SISTEMA PRINCIPAL -->
        <div id="sistema" class="hidden">
            <div class="card">
                <div class="header">
                    <h1>🚀 Entrega Fácil Super</h1>
                    <div>
                        <span id="nomeUsuarioLogado"></span>
                        <span id="tipoUsuarioLogado" class="badge"></span>
                        <button class="danger" onclick="logout()">SAIR</button>
                    </div>
                </div>
                <div class="tabs" id="abas"></div>
            </div>

            <!-- ABA: PAINEL -->
            <div id="abaPainel" class="card aba">
                <h2>📊 Painel</h2>
                <div class="grid-3">
                    <div class="card">
                        <h3>Pedidos Pendentes</h3>
                        <h1 id="totalPendentes">0</h1>
                    </div>
                    <div class="card">
                        <h3>Em Andamento</h3>
                        <h1 id="totalAndamento">0</h1>
                    </div>
                    <div class="card">
                        <h3>Finalizados Hoje</h3>
                        <h1 id="totalFinalizados">0</h1>
                    </div>
                </div>
            </div>

            <!-- ABA: PEDIDOS -->
            <div id="abaPedidos" class="card aba hidden">
                <h2>📦 Pedidos</h2>
                <div id="formPedido" class="hidden">
                    <h3>Novo Pedido</h3>
                    <input type="text" id="pedidoCliente" placeholder="Nome do Cliente">
                    <input type="text" id="pedidoEndereco" placeholder="Endereço de Entrega">
                    <input type="number" id="pedidoValor" placeholder="Valor R$">
                    <textarea id="pedidoObs" placeholder="Observações"></textarea>
                    <button class="success" onclick="criarPedido()">CRIAR PEDIDO</button>
                </div>
                <div id="listaPedidos"></div>
            </div>

            <!-- ABA: CHAT -->
            <div id="abaChat" class="card aba hidden">
                <h2>💬 Chat</h2>
                <select id="chatDestinatario" onchange="carregarChat()">
                    <option value="">Selecione para conversar</option>
                </select>
                <div id="chatBox" class="chat-box"></div>
                <input type="text" id="chatMensagem" placeholder="Digite sua mensagem" onkeypress="if(event.key==='Enter') enviarMensagem()">
                <button onclick="enviarMensagem()">ENVIAR</button>
            </div>

            <!-- ABA: USUÁRIOS - SÓ ADMIN -->
            <div id="abaUsuarios" class="card aba hidden">
                <h2>👥 Usuários</h2>
                <div class="grid">
                    <div>
                        <h3>Cadastrar Usuário</h3>
                        <input type="text" id="novoUsuario" placeholder="Usuário">
                        <input type="password" id="novaSenha" placeholder="Senha">
                        <input type="text" id="novoNome" placeholder="Nome Completo">
                        <select id="novoTipo">
                            <option value="admin">Administrador</option>
                            <option value="entregador">Entregador</option>
                            <option value="restaurante">Restaurante</option>
                        </select>
                        <button class="success" onclick="cadastrarUsuario()">CADASTRAR</button>
                    </div>
                    <div>
                        <h3>Alterar Minha Senha</h3>
                        <input type="password" id="senhaAtual" placeholder="Senha Atual">
                        <input type="password" id="senhaNova" placeholder="Nova Senha">
                        <button onclick="alterarSenha()">ALTERAR SENHA</button>
                    </div>
                </div>
                <h3>Lista de Usuários</h3>
                <table id="tabelaUsuarios">
                    <thead><tr><th>Usuário</th><th>Nome</th><th>Tipo</th><th>Status</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, get, set, push, onValue, update, remove, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // SEU FIREBASE CONFIG COM DADOS REAIS
        const firebaseConfig = {
            apiKey: "AIzaSyA_gBrD7Ty0Obw6qcGpbJ9HmI7Ydnv6FMw",
            authDomain: "entrega-facil-super.firebaseapp.com",
            databaseURL: "https://entrega-facil-super-default-rtdb.firebaseio.com",
            projectId: "entrega-facil-super",
            storageBucket: "entrega-facil-super.appspot.com",
            messagingSenderId: "428684283332",
            appId: "1:428684283332:web:32162cd744695fba10a891"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let usuarioLogado = null;
        let tipoLogado = null;
        let nomeLogado = null;
        let audioTocando = false;
        let timeoutNotificacao = null;
        let chatAtual = null;

        // MANTER LOGADO
        window.onload = () => {
            const salvo = localStorage.getItem('usuarioLogado');
            if (salvo) {
                const dados = JSON.parse(salvo);
                usuarioLogado = dados.usuario;
                tipoLogado = dados.tipo;
                nomeLogado = dados.nome;
                entrarNoSistema();
            }
            testarConexao();
        };

        // CONEXÃO
        function testarConexao() {
            get(ref(db, '/')).then(() => {
                document.getElementById('statusConexao').className = 'status conectado';
                document.getElementById('statusConexao').innerHTML = '✅ Conectado ao Firebase';
                verificarAdminInicial();
            }).catch(err => {
                document.getElementById('statusConexao').className = 'status erro';
                document.getElementById('statusConexao').innerHTML = '❌ Erro: ' + err.message;
            });
        }

        function verificarAdminInicial() {
            get(ref(db, 'usuarios/Admin')).then(snap => {
                if (!snap.exists()) {
                    document.getElementById('criarAdminInicial').classList.remove('hidden');
                }
            });
        }

        window.criarAdminInicial = () => {
            set(ref(db, 'usuarios/Admin'), {
                senha: '123', tipo: 'admin', nome: 'Administrador', ativo: true
            }).then(() => {
                alert('Admin criado! Usuário: Admin | Senha: 123');
                document.getElementById('criarAdminInicial').classList.add('hidden');
            });
        };

        // LOGIN
        window.fazerLogin = () => {
            const user = document.getElementById('loginUsuario').value;
            const pass = document.getElementById('loginSenha').value;
            if (!user || !pass) return alert('Preencha usuário e senha');

            get(ref(db, `usuarios/${user}`)).then(snap => {
                if (snap.exists() && snap.val().senha === pass && snap.val().ativo) {
                    usuarioLogado = user;
                    tipoLogado = snap.val().tipo;
                    nomeLogado = snap.val().nome;
                    localStorage.setItem('usuarioLogado', JSON.stringify({usuario: user, tipo: tipoLogado, nome: nomeLogado}));
                    entrarNoSistema();
                } else {
                    alert('Usuário ou senha inválidos');
                }
            });
        };

        function entrarNoSistema() {
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('sistema').classList.remove('hidden');
            document.getElementById('nomeUsuarioLogado').innerText = nomeLogado;
            const badge = document.getElementById('tipoUsuarioLogado');
            badge.innerText = tipoLogado.toUpperCase();
            badge.className = `badge ${tipoLogado}`;
            montarAbas();
            mostrarAba('Painel');
            escutarPedidos();
            escutarChat();
            carregarUsuarios();
        }

        window.logout = () => {
            localStorage.removeItem('usuarioLogado');
            location.reload();
        };

        // ABAS
        function montarAbas() {
            const abas = document.getElementById('abas');
            abas.innerHTML = '';
            const todasAbas = ['Painel', 'Pedidos', 'Chat'];
            if (tipoLogado === 'admin') todasAbas.push('Usuários');
            if (tipoLogado === 'restaurante') document.getElementById('formPedido').classList.remove('hidden');
            
            todasAbas.forEach(aba => {
                abas.innerHTML += `<div class="tab" onclick="mostrarAba('${aba}')">${aba}</div>`;
            });
        }

        window.mostrarAba = (nome) => {
            document.querySelectorAll('.aba').forEach(a => a.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
            document.getElementById(`aba${nome}`).classList.remove('hidden');
            event?.target.classList.add('ativo');
            if (nome === 'Pedidos') carregarPedidos();
            if (nome === 'Chat') carregarDestinatarios();
        };

        // USUÁRIOS
        window.cadastrarUsuario = () => {
            if (tipoLogado !== 'admin') return alert('Só admin pode cadastrar');
            const user = document.getElementById('novoUsuario').value;
            const senha = document.getElementById('novaSenha').value;
            const nome = document.getElementById('novoNome').value;
            const tipo = document.getElementById('novoTipo').value;
            if (!user || !senha || !nome) return alert('Preencha todos os campos');

            set(ref(db, `usuarios/${user}`), { senha, nome, tipo, ativo: true }).then(() => {
                alert('Usuário cadastrado!');
