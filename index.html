<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrega Fácil Super</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
    body{background:#f5f5f5}
.container{max-width:500px;margin:0 auto;background:#fff;min-height:100vh}
.login{padding:40px 20px;text-align:center}
.login h1{color:#FF6B00;margin-bottom:30px;font-size:28px}
.login input,.login select{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:8px;font-size:16px}
.btn{background:#FF6B00;color:#fff;border:none;padding:14px 30px;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;margin-top:10px}
.btn:active{transform:scale(0.98)}
.btn-small{padding:8px 12px;font-size:14px;width:auto;margin:5px}
.btn-danger{background:#dc3545}
.btn-success{background:#28a745}
.header{background:#FF6B00;color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
.header h2{font-size:20px}
.tabs{display:flex;background:#eee}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;border:none;background:#eee;font-weight:600}
.tab.active{background:#fff;color:#FF6B00;border-bottom:3px solid #FF6B00}
.content{padding:20px}
.card{background:#fff;border:2px solid #eee;border-radius:12px;padding:15px;margin-bottom:15px}
.card h3{color:#333;margin-bottom:8px}
.card p{color:#666;margin:4px 0;font-size:14px}
.status{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;margin-top:8px}
.status.pendente{background:#fff3cd;color:#856404}
.status.aceito{background:#d1ecf1;color:#0c5460}
.status.caminho{background:#d4edda;color:#155724}
.status.entregue{background:#e2e3e5;color:#383d41}
.input-group{margin:15px 0}
.input-group label{display:block;margin-bottom:5px;font-weight:600;color:#333}
.input-group input,.input-group textarea,.input-group select{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:15px}
.firebase-status{text-align:center;padding:8px;font-size:13px;background:#d4edda;color:#155724}
.firebase-status.error{background:#f8d7da;color:#721c24}
.chat-box{border:2px solid #ddd;border-radius:8px;height:200px;overflow-y:auto;padding:10px;margin:10px 0;background:#fafafa}
.chat-msg{margin:5px 0;padding:8px;border-radius:8px;max-width:80%}
.chat-msg.eu{background:#FF6B00;color:#fff;margin-left:auto}
.chat-msg.outro{background:#e9ecef;color:#333}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999}
.modal.active{display:flex;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:25px;border-radius:12px;width:90%;max-width:400px}
.hidden{display:none}
.notif-bar{background:#ffc107;color:#333;padding:10px;text-align:center;font-size:14px;font-weight:bold;cursor:pointer}
  
.card-entrega{background:#2d2d2d;color:#fff;border-radius:16px;padding:0;overflow:hidden;margin-bottom:15px;border:none}
.card-entrega-header{background:#1a1a1a;padding:15px}
.tag{background:#FF6B00;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold;display:inline-block}
.card-entrega-valor{font-size:36px;font-weight:bold;margin:10px 0 0 0}
.card-entrega-body{padding:15px}
.linha-amarela{height:3px;background:#FFC107;margin:0}
.rota{margin:15px 0}
.rota-item{display:flex;align-items:flex-start;margin:10px 0}
.rota-bolinha{width:12px;height:12px;border-radius:50%;margin-right:12px;margin-top:4px;flex-shrink:0}
.rota-bolinha.amarelo{background:#FFC107}
.rota-bolinha.laranja{background:#FF6B00}
.rota-endereco{flex:1}
.rota-endereco b{display:block;font-size:14px;margin-bottom:2px}
.rota-endereco span{font-size:13px;color:#bbb}
.btn-aceitar{background:#FFC107;color:#1a1a1a;border:none;padding:16px;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;margin-top:10px}
.btn-aceitar:active{transform:scale(0.98)}
  </style>
</head>
<body>
  <div class="container">
    <div id="loginScreen" class="login">
      <h1>🚚 Entrega Fácil Super</h1>
      <div id="firebaseStatus" class="firebase-status">🔄 Conectando...</div>
      <select id="tipoLogin">
        <option value="">Selecione o tipo</option>
        <option value="admin">Administrador</option>
        <option value="restaurante">Restaurante</option>
        <option value="entregador">Entregador</option>
      </select>
      <input type="text" id="usuario" placeholder="Usuário">
      <input type="password" id="senha" placeholder="Senha">
      <button class="btn" onclick="logar()">ENTRAR</button>
      <button class="btn" id="btnCriarAdmin" style="background:#28a745;display:none;margin-top:20px" onclick="criarAdminInicial()">+ CRIAR ADMIN INICIAL</button>
    </div>

    <div id="appScreen" class="hidden">
      <div id="notifBar" class="notif-bar hidden">🔔 Clique aqui para ativar notificações</div>
      <div class="header">
        <h2 id="nomeUser">Olá</h2>
        <button class="btn-small" onclick="sair()" style="background:rgba(255,255,255,0.2)">Sair</button>
      </div>
      <div id="firebaseStatusApp" class="firebase-status">✅ Conectado ao Firebase</div>
      <div class="tabs" id="tabs"></div>
      <div class="content" id="content"></div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, set, onValue, push, remove, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA_gBrD7Ty0Obw6qcGpbJ9HmI7Ydnv6FMw",
      authDomain: "entrega-facil-super.firebaseapp.com",
      databaseURL: "https://entrega-facil-super-default-rtdb.firebaseio.com",
      projectId: "entrega-facil-super",
      storageBucket: "entrega-facil-super.appspot.com",
      messagingSenderId: "428684283332",
      appId: "1:428684283332:web:32162cd744695fba10a891"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let userAtual = null;
    let pedidos = {};
    let usuarios = {};
    let chats = {};
    let audioNotificacao = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
    audioNotificacao.loop = true;
    let audioTocando = false;
    let timeoutNotificacao = null;

    window.criarAdminInicial = () => {
      const id = Date.now().toString();
      set(ref(db,'usuarios/'+id),{id:id,n:'Admin',u:'Admin',s:'123',t:'admin'});
      alert('Admin criado! Usuário: Admin | Senha: 123');
      document.getElementById('btnCriarAdmin').style.display='none';
    }

    function pedirPermissaoNotif(){
      if(!('Notification' in window)) return;
      if(Notification.permission === 'default'){
        document.getElementById('notifBar').classList.remove('hidden');
        document.getElementById('notifBar').onclick = () => {
          Notification.requestPermission().then(perm => {
            if(perm === 'granted') document.getElementById('notifBar').classList.add('hidden');
          });
        }
      }
    }

    function notificar(titulo, corpo){
      audioNotificacao.play();
      if(!audioTocando){
        audioTocando = true;
        timeoutNotificacao = setTimeout(()=>{
          audioNotificacao.pause();
          audioNotificacao.currentTime = 0;
          audioTocando = false;
        }, 25000);
      }
      if(!('Notification' in window) || Notification.permission!== 'granted') return;
      new Notification(titulo, {
        body: corpo,
        icon: 'https://cdn-icons-png.flaticon.com/512/1048/1048315.png',
        vibrate: [200, 100, 200]
      });
    }

    function pararNotificacao(){
      audioNotificacao.pause();
      audioNotificacao.currentTime = 0;
      audioTocando = false;
      clearTimeout(timeoutNotificacao);
    }

    window.logar = () => {
      const tipo = document.getElementById('tipoLogin').value;
      const u = document.getElementById('usuario').value;
      const s = document.getElementById('senha').value;
      if(!tipo||!u||!s) return alert('Preencha todos os campos');
      
      const user = Object.values(usuarios).find(us => us.u===u && us.s===s && us.t.toLowerCase()===tipo);
      if(!user) return alert('Usuário ou senha inválidos');
      if(!user.id) return alert('Usuário antigo sem ID. Apague e crie novamente pelo painel admin.');
      
      userAtual = user;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('appScreen').classList.remove('hidden');
      document.getElementById('nomeUser').textContent = `Olá, ${user.n}`;
      
      if(user.t.toLowerCase()==='entregador') pedirPermissaoNotif();
      carregarApp();
    }

    window.sair = () => {
      userAtual = null;
      pararNotificacao();
      document.getElementById('appScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    }

    function carregarApp(){
      const tabs = document.getElementById('tabs');
      const tipo = userAtual.t.toLowerCase();
      if(tipo==='admin') tabs.innerHTML = `<button class="tab active" onclick="mudarAba(0)">Usuários</button><button class="tab" onclick="mudarAba(1)">Pedidos</button>`;
      else if(tipo==='restaurante') tabs.innerHTML = `<button class="tab active" onclick="mudarAba(0)">Novo Pedido</button><button class="tab" onclick="mudarAba(1)">Meus Pedidos</button><button class="tab" onclick="mudarAba(2)">Histórico</button>`;
      else tabs.innerHTML = `<button class="tab active" onclick="mudarAba(0)">Disponíveis</button><button class="tab" onclick="mudarAba(1)">Minhas Entregas</button><button class="tab" onclick="mudarAba(2)">Histórico</button>`;
      mudarAba(0);
    }

    window.mudarAba = (i) => {
      document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
      const tipo = userAtual.t.toLowerCase();
      if(tipo==='admin') i===0?abaUsuarios():abaPedidosAdmin();
      else if(tipo==='restaurante') i===0?abaNovoPedido():i===1?abaPedidosRest():abaHistorico();
      else i===0?abaDisponiveis():i===1?abaMinhasEntregas():abaHistorico();
    }

    function abaUsuarios(){
      let html = `<button class="btn" onclick="modalNovoUser()">+ Novo Usuário</button>
      <button class="btn" onclick="modalAlterarSenha()" style="background:#6c757d;margin-top:10px">🔑 Alterar Minha Senha</button>
      <div style="margin-top:20px">`;
      Object.values(usuarios).forEach(u=>{
        html += `<div class="card"><h3>${u.n}</h3><p>Tipo: ${u.t}</p><p>Usuário: ${u.u}</p><button class="btn-small btn-danger" onclick="delUser('${u.id}')">Excluir</button></div>`;
      });
      document.getElementById('content').innerHTML = html+'</div>';
    }

    window.modalAlterarSenha = () => {
      document.getElementById('modalContent').innerHTML = `
        <h3>Alterar Minha Senha</h3>
        <div class="input-group"><label>Senha Atual</label><input id="senhaAtual" type="password"></div>
        <div class="input-group"><label>Nova Senha</label><input id="senhaNova" type="password"></div>
        <button class="btn" onclick="alterarSenha()">SALVAR</button>
        <button class="btn" style="background:#6c757d;margin-top:5px" onclick="fecharModal()">Cancelar</button>
      `;
      document.getElementById('modal').classList.add('active');
    }

    window.alterarSenha = () => {
      const atual = document.getElementById('senhaAtual').value;
      const nova = document.getElementById('senhaNova').value;
      if(!atual||!nova) return alert('Preencha as senhas');
      if(userAtual.s!==atual) return alert('Senha atual incorreta');
      update(ref(db,'usuarios/'+userAtual.id),{s:nova});
      userAtual.s = nova;
      alert('Senha alterada com sucesso!');
      fecharModal();
    }

    window.modalNovoUser = () => {
      document.getElementById('modalContent').innerHTML = `
        <h3>Novo Usuário</h3>
        <div class="input-group"><label>Nome</label><input id="novoNome"></div>
        <div class="input-group"><label>Usuário</label><input id="novoUser"></div>
        <div class="input-group"><label>Senha</label><input id="novaSenha" type="password"></div>
        <div class="input-group"><label>Tipo</label><select id="novoTipo"><option value="restaurante">Restaurante</option><option value="entregador">Entregador</option><option value="admin">Administrador</option></select></div>
        <button class="btn" onclick="criarUser()">Criar</button>
        <button class="btn" style="background:#6c757d;margin-top:5px" onclick="fecharModal()">Cancelar</button>
      `;
      document.getElementById('modal').classList.add('active');
    }

    window.criarUser = () => {
      const n = document.getElementById('novoNome').value;
      const u = document.getElementById('novoUser').value;
      const s = document.getElementById('novaSenha').value;
      const t = document.getElementById('novoTipo').value;
      if(!n||!u||!s) return alert('Preencha tudo');
      const id = Date.now().toString();
      set(ref(db,'usuarios/'+id),{id,n,u,s,t});
      fecharModal();
    }

    window.delUser = (id) => {
      if(confirm('Excluir usuário?')) remove(ref(db,'usuarios/'+id));
    }

    function abaNovoPedido(){
      document.getElementById('content').innerHTML = `
        <div class="input-group"><label>Nome do Cliente</label><input id="cliNome"></div>
        <div class="input-group"><label>Telefone</label><input id="cliTel"></div>
        <div class="input-group"><label>Endereço de Entrega</label><textarea id="cliEnd" rows="2"></textarea></div>
        <div class="input-group"><label>Valor do Pedido R$</label><input id="cliValor" type="number" step="0.01"></div>
        <div class="input-group"><label>Taxa de Entrega R$</label><input id="cliTaxa" type="number" step="0.01" value="5.00"></div>
        <div class="input-group"><label>Forma de Pagamento</label><select id="cliPag"><option value="PIX">PIX</option><option value="DINHEIRO">DINHEIRO</option><option value="CARTÃO">CARTÃO</option></select></div>
        <div class="input-group"><label>Endereço do Restaurante <button class="btn-small" onclick="configEnd()">⚙️</button></label><input id="restEnd" value="${userAtual.endereco||''}" placeholder="Configure o endereço"></div>
        <button class="btn" onclick="criarPedido()">CRIAR PEDIDO</button>
      `;
    }

    window.configEnd = () => {
      const end = prompt('Endereço do seu restaurante:',userAtual.endereco||'');
      if(end) update(ref(db,'usuarios/'+userAtual.id),{endereco:end});
    }

    window.criarPedido = () => {
      if(!userAtual?.id) return alert('Erro: usuário sem ID. Faça logout e login novamente');
      const nome = document.getElementById('cliNome').value;
      const tel = document.getElementById('cliTel').value;
      const end = document.getElementById('cliEnd').value;
      const valor = parseFloat(document.getElementById('cliValor').value) || 0;
      const taxa = parseFloat(document.getElementById('cliTaxa').value) || 0;
      const pag = document.getElementById('cliPag').value;
      const restEnd = document.getElementById('restEnd').value;
      if(!nome||!tel||!end||!valor) return alert('Preencha todos os campos obrigatórios');
      const id = Date.now().toString();
      set(ref(db,'pedidos/'+id),{
        id,
        restaurante:userAtual.n,
        restauranteId:userAtual.id,
        cliente:nome,
        telefone:tel,
        endereco:end,
        valor,
        taxa,
        pagamento:pag,
        endRestaurante:restEnd,
        status:'pendente',
        data:new Date().toISOString()
      });
      alert('Pedido criado!');
      mudarAba(1);
    }

    function abaPedidosRest(){
      let html = '';
      const meusPedidos = Object.values(pedidos).filter(p=>p.restauranteId===userAtual.id && p.status!=='entregue').reverse();
      if(meusPedidos.length===0) html='<p style="text-align:center;color:#666">Nenhum pedido ativo</p>';
      meusPedidos.forEach(p=>{
        const v = parseFloat(p.valor) || 0;
        const t = parseFloat(p.taxa) || 0;
        html += `<div class="card">
          <h3>${p.cliente}</h3>
          <p>📞 ${p.telefone}</p>
          <p>📍 ${p.endereco}</p>
          <p>💰 Pedido: R$ ${v.toFixed(2)} | Entrega: R$ ${t.toFixed(2)}</p>
          <p>💳 ${p.pagamento}</p>
          <span class="status ${p.status}">${p.status.toUpperCase()}</span>
          ${p.entregador?`<p>🚚 ${p.entregador}</p>`:''}
          <button class="btn-small" onclick="abrirChat('${p.id}')">💬 Chat</button>
        </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    function abaDisponiveis(){
      let html = '';
      const disponiveis = Object.values(pedidos).filter(p=>p.status==='pendente').reverse();
      if(disponiveis.length===0) html='<p style="text-align:center;color:#666">Nenhum pedido disponível</p>';
      disponiveis.forEach(p=>{
        const taxa = parseFloat(p.taxa) || 0;
        html += `<div class="card-entrega">
          <div class="card-entrega-header">
            <span class="tag">🍽️ Entrega Food</span>
            <div class="card-entrega-valor">R$ ${taxa.toFixed(2)}</div>
          </div>
          <div class="linha-amarela"></div>
          <div class="card-entrega-body">
            <div class="rota">
              <div class="rota-item">
                <div class="rota-bolinha amarelo"></div>
                <div class="rota-endereco">
                  <b>${p.restaurante}</b>
                  <span>${p.endRestaurante||'Endereço não informado'}</span>
                </div>
              </div>
              <div class="rota-item">
                <div class="rota-bolinha laranja"></div>
                <div class="rota-endereco">
                  <b>${p.cliente}</b>
                  <span>${p.endereco}</span>
                </div>
              </div>
            </div>
            <p style="font-size:13px;color:#bbb;margin-bottom:10px">💰 Pedido: R$ ${(parseFloat(p.valor)||0).toFixed(2)} | ${p.pagamento}</p>
            <button class="btn-aceitar" onclick="aceitarPedido('${p.id}')">Aceitar pedido</button>
          </div>
        </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    window.aceitarPedido = (id) => {
      update(ref(db,'pedidos/'+id),{status:'aceito',entregador:userAtual.n,entregadorId:userAtual.id});
      pararNotificacao();
      notificar('Pedido aceito!', 'Você aceitou uma nova entrega');
      mudarAba(1);
    }

    function abaMinhasEntregas(){
      let html = '';
      const minhas = Object.values(pedidos).filter(p=>p.entregadorId===userAtual.id && p.status!=='entregue').reverse();
      if(minhas.length===0) html='<p style="text-align:center;color:#666">Nenhuma entrega ativa</p>';
      minhas.forEach(p=>{
        const v = parseFloat(p.valor) || 0;
        const t = parseFloat(p.taxa) || 0;
        html += `<div class="card">
          <h3>${p.restaurante}</h3>
          <p>👤 ${p.cliente} - ${p.telefone}</p>
          <p>📍 Retirar: ${p.endRestaurante||'Ver com restaurante'}</p>
          <p>📍 Entregar: ${p.endereco}</p>
          <p>💰 Pedido: R$ ${v.toFixed(2)} | Entrega: R$ ${t.toFixed(2)}</p>
          <p>💳 ${p.pagamento}</p>
          <span class="status ${p.status}">${p.status.toUpperCase()}</span>
          <button class="btn-small" onclick="abrirMaps('${p.endereco}')">📍 GPS Entrega</button>
          <button class="btn-small" onclick="abrirMaps('${p.endRestaurante}')">📍 GPS Restaurante</button>
          <button class="btn-small" onclick="abrirChat('${p.id}')">💬 Chat</button>
          ${p.status==='aceito'?`<button class="btn btn-small" onclick="mudarStatus('${p.id}','caminho')">INICIAR ENTREGA</button>`:''}
          ${p.status==='caminho'?`<button class="btn btn-success btn-small" onclick="mudarStatus('${p.id}','entregue')">FINALIZAR</button>`:''}
        </div>`;
      });
      document.getElementById('content').innerHTML = html;
    }

    window.abrirMaps = (end) => {
      if(!end) return alert('Endereço não informado');
      window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(end)}`);
    }

    window.mudarStatus = (id,st) => {
      update(ref(db,'pedidos/'+id),{status:st});
      if(st==='entregue') {
        notificar('Entrega finalizada!', 'Parabéns!');
        pararNotificacao();
      }
    }

    window.abrirChat = (pedidoId) => {
      const pedido = pedidos[pedidoId];
      const chatId = pedidoId;
      document.getElementById('modalContent').innerHTML = `
        <h3>Chat - ${pedido.cliente}</h3>
        <div class="chat-box" id="chatBox"></div>
        <div style="display:flex;gap:5px">
          <input id="msgInput" placeholder="Digite..." style="flex:1;padding:10px;border:2px solid #ddd;border-radius:8px">
          <button class="btn" style="width:auto;padding:10px 20px" onclick="enviarMsg('${chatId}')">Enviar</button>
        </div>
        <button class="btn" style="background:#6c757d;margin-top:10px" onclick="fecharModal()">Fechar</button>
      `;
      document.getElementById('modal').classList.add('active');
      carregarChat(chatId);
    }

    function carregarChat(chatId){
      const box = document.getElementById('chatBox');
      if(!box) return;
      onValue(ref(db,'chats/'+chatId),(snap)=>{
        const msgs = snap.val()||{};
        let html = '';
        Object.values(msgs).forEach(m=>{
          const classe = m.remetenteId===userAtual.id?'eu':'outro';
          html += `<div class="chat-msg ${classe}"><b>${m.remetente}:</b> ${m.texto}</div>`;
        });
        box.innerHTML = html;
        box.scrollTop = box.scrollHeight;
      });
    }

    window.enviarMsg = (chatId) => {
      const input = document.getElementById('msgInput');
      const texto = input.value.trim();
      if(!texto) return;
      push(ref(db,'chats/'+chatId),{
        remetente:userAtual.n,
        remetenteId:userAtual.id,
        texto,
        data:new Date().toISOString()
      });
      input.value='';
      notificar('Nova mensagem', texto);
    }

    function abaHistorico(){
      let html = '';
      const tipo = userAtual.t.toLowerCase();
      let lista = Object.values(pedidos).filter(p=>{
        if(tipo==='restaurante') return p.restauranteId===userAtual.id && p.status==='entregue';
        if(tipo==='entregador') return p.entregadorId===userAtual.id && p.status==='entregue';
        return false;
      }).reverse();
      const total = lista.reduce((s,p)=>s+(parseFloat(p.taxa)||0),0);
      html += `<div class="card" style="background:#d4edda"><h3>Total ganho: R$ ${total.toFixed(2)}</h3><p>${lista.length} entregas</p></div>`;
      lista.forEach(p=>{
        const v = parseFloat(p.valor) || 0;
        const t = parseFloat(p.taxa) || 0;
        html += `<div class="card">
          <h3>${tipo==='restaurante'?p.cliente:p.restaurante}</h3>
          <p>💰 Pedido: R$ ${v.toFixed(2)} | Entrega: R$ ${t.toFixed(2)}</p>
          <p style="font-size:12px;color:#999">${new Date(p.data).toLocaleString('pt-BR')}</p>
        </div>`;
      });
      document.getElementById('content').innerHTML = html||'<p style="text-align:center;color:#666">Nenhum histórico</p>';
    }

    function abaPedidosAdmin(){
      let html = '';
      Object.values(pedidos).reverse().forEach(p=>{
        const v = parseFloat(p.valor) || 0;
        const t = parseFloat(p.taxa) || 0;
        html += `<div class="card">
          <h3>${p.restaurante} → ${p.cliente}</h3>
          <p>💰 R$ ${v.toFixed(2)} | Entrega: R$ ${t.toFixed(2)}</p>
          <span class="status ${p.status}">${p.status.toUpperCase()}</span>
          ${p.entregador?`<p>🚚 ${p.entregador}</p>`:''}
        </div>`;
      });
      document.getElementById('content').innerHTML = html||'<p style="text-align:center;color:#666">Nenhum pedido</p>';
    }

    window.fecharModal = () => document.getElementById('modal').classList.remove('active');

    onValue(ref(db,'usuarios'),(snap)=>{
      usuarios = snap.val()||{};
      document.getElementById('firebaseStatus').className='firebase-status';
      document.getElementById('firebaseStatus').textContent='✅ Conectado ao Firebase';
      document.getElementById('firebaseStatusApp').className='firebase-status';
      document.getElementById('firebaseStatusApp').textContent='✅ Conectado ao Firebase';
      
      if(Object.keys(usuarios).length === 0){
        document.getElementById('btnCriarAdmin').style.display='block';
      } else {
        document.getElementById('btnCriarAdmin').style.display='none';
      }
    },()=>{
      document.getElementById('firebaseStatus').className='firebase-status error';
      document.getElementById('firebaseStatus').textContent='❌ Erro ao conectar';
    });

    onValue(ref(db,'pedidos'),(snap)=>{
      const novos = snap.val()||{};
      const antes = Object.keys(pedidos).length;
      const depois = Object.keys(novos).length;
      
      if(userAtual && userAtual.t.toLowerCase()==='entregador' && depois>antes){
        const novosPedidos = Object.values(novos).filter(p=>!pedidos[p.id] && p.status==='pendente');
        if(novosPedidos.length>0) notificar('🚚 Novo pedido disponível!', `${novosPedidos[0].restaurante} - R$ ${(parseFloat(novosPedidos[0].taxa)||0).toFixed(2)}`);
      }
      
      pedidos = novos;
      if(userAtual) mudarAba(document.querySelector('.tab.active')?Array.from(document.querySelectorAll('.tab')).indexOf(document.querySelector('.tab.active')):0);
    });

    onValue(ref(db,'chats'),(snap)=>{
      const novosChats = snap.val()||{};
      if(userAtual){
        Object.keys(novosChats).forEach(chatId=>{
          const msgs = novosChats[chatId];
          const ultimasMsgs = Object.values(msgs);
          const ultima = ultimasMsgs[ultimasMsgs.length-1];
          const chatAntigo = chats[chatId]? Object.values(chats[chatId]) : [];
          if(ultima && ultima.remetenteId!== userAtual.id && pedidos[chatId] && ultimasMsgs.length > chatAntigo.length){
            notificar(`💬 ${ultima.remetente}`, ultima.texto);
          }
        });
      }
      chats = novosChats;
    });
  </script>
</body>
</html>
